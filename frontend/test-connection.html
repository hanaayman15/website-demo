<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Connection Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Backend Connection Test</h1>
        
        <div class="space-y-4">
            <div class="p-4 bg-blue-50 rounded border border-blue-200">
                <p class="font-semibold text-gray-700">API URL:</p>
                <p id="apiUrl" class="text-blue-600 font-mono">Loading...</p>
            </div>

            <button 
                onclick="testConnection()" 
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition"
            >
                Test Backend Connection
            </button>

            <div id="result" class="p-4 bg-gray-50 rounded border border-gray-200 hidden">
                <p class="font-semibold text-gray-700 mb-2">Result:</p>
                <pre id="resultText" class="text-sm overflow-auto"></pre>
            </div>

            <div class="mt-6 p-4 bg-yellow-50 rounded border border-yellow-200">
                <p class="font-semibold text-yellow-800 mb-2">Quick Tests:</p>
                <div class="space-y-2">
                    <button onclick="testHealth()" class="w-full bg-yellow-500 text-white py-2 rounded hover:bg-yellow-600">
                        Test /health
                    </button>
                    <button onclick="testRoot()" class="w-full bg-yellow-500 text-white py-2 rounded hover:bg-yellow-600">
                        Test / (root)
                    </button>
                    <button onclick="testLogin()" class="w-full bg-yellow-500 text-white py-2 rounded hover:bg-yellow-600">
                        Test Login Endpoint
                    </button>
                </div>
            </div>

            <div class="mt-6">
                <a href="client-login.html" class="text-blue-600 hover:underline">← Back to Login</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // Display the API URL
        document.getElementById('apiUrl').textContent = CONFIG.API_BASE_URL;

        function showResult(message, isSuccess = true) {
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('resultText');
            resultDiv.classList.remove('hidden');
            resultDiv.className = `p-4 rounded border ${isSuccess ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`;
            resultText.textContent = message;
        }

        async function testConnection() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/health`);
                const data = await response.json();
                showResult(`✅ SUCCESS!\n\nStatus: ${response.status}\n\nResponse:\n${JSON.stringify(data, null, 2)}`, true);
            } catch (error) {
                showResult(`❌ CONNECTION FAILED\n\nError: ${error.message}\n\nMake sure backend is running on:\n${CONFIG.API_BASE_URL}`, false);
            }
        }

        async function testHealth() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/health`);
                const data = await response.json();
                showResult(`/health: ${response.status}\n${JSON.stringify(data, null, 2)}`, response.ok);
            } catch (error) {
                showResult(`/health failed: ${error.message}`, false);
            }
        }

        async function testRoot() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/`);
                const data = await response.json();
                showResult(`/ (root): ${response.status}\n${JSON.stringify(data, null, 2)}`, response.ok);
            } catch (error) {
                showResult(`/ (root) failed: ${error.message}`, false);
            }
        }

        async function testLogin() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: 'demo@client.com', 
                        password: 'demo123' 
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showResult(`Login endpoint works!\n\nStatus: ${response.status}\n\nDemo login successful!\nToken received: ${data.access_token ? 'YES' : 'NO'}`, true);
                } else {
                    const data = await response.json();
                    showResult(`Login endpoint responded: ${response.status}\n${JSON.stringify(data, null, 2)}`, false);
                }
            } catch (error) {
                showResult(`Login test failed: ${error.message}`, false);
            }
        }
    </script>
</body>
</html>
