<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Recipes - Nutrition Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .recipe-card {
            transition: all 0.3s ease;
        }

        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .recipe-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .recipe-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .recipe-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .filter-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            background: #f0f4ff;
            color: #667eea;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            margin: 5px;
        }

        .filter-badge.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .nutrition-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-right: 5px;
            margin-top: 5px;
        }

        .macro-protein { background: #ffd4d4; color: #c41e3a; }
        .macro-carbs { background: #fff4d4; color: #cc8800; }
        .macro-fats { background: #d4f0ff; color: #0066cc; }

        .meal-type-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .breakfast-badge { background: #fff3cd; color: #856404; }
        .lunch-badge { background: #d1ecf1; color: #0c5460; }
        .dinner-badge { background: #f8d7da; color: #721c24; }
        .snack-badge { background: #e2e3e5; color: #383d41; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <div class="recipe-header">
        <a href="client-home.html" class="text-white hover:text-gray-200 float-left text-2xl">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1>All Recipes</h1>
        <p>Explore our collection of healthy, nutritious recipes</p>
    </div>

    <!-- Search and Filter -->
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Search Bar -->
        <div class="mb-8">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search recipes by name or ingredient..." 
                class="w-full px-6 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 shadow-sm"
            >
        </div>

        <!-- Filter Badges -->
        <div class="mb-8">
            <p class="text-gray-700 font-semibold mb-3">Filter by Meal Type:</p>
            <div>
                <span class="filter-badge active" onclick="filterRecipes('all')">All Recipes</span>
                <span class="filter-badge" onclick="filterRecipes('breakfast')">🌅 Breakfast</span>
                <span class="filter-badge" onclick="filterRecipes('lunch')">🍽️ Lunch</span>
                <span class="filter-badge" onclick="filterRecipes('dinner')">🌙 Dinner</span>
                <span class="filter-badge" onclick="filterRecipes('snack')">🍎 Snack</span>
                <span class="filter-badge" onclick="filterRecipes('pre-workout')">💪 Pre-Workout</span>
                <span class="filter-badge" onclick="filterRecipes('post-workout')">⚡ Post-Workout</span>
            </div>
        </div>

        <!-- Recipes Grid -->
        <div id="recipesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Recipes will be populated here by JavaScript -->
        </div>
    </div>

    <!-- Recipe Detail Modal -->
    <div id="recipeModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full max-h-screen overflow-y-auto">
            <div class="p-6">
                <button onclick="closeRecipeModal()" class="float-right text-gray-500 hover:text-gray-700 text-2xl">
                    <i class="fas fa-times"></i>
                </button>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        const recipes = [
            {
                id: 1,
                name: "Oatmeal with Berries",
                type: "breakfast",
                description: "Nutritious oatmeal topped with fresh berries for a perfect start",
                image: "🥣",
                ingredients: ["Oats", "Blueberries", "Strawberries", "Honey", "Milk"],
                instructions: "1. Cook oats\n2. Top with berries\n3. Add honey",
                nutrition: { protein: 10, carbs: 45, fats: 5, calories: 280 }
            },
            {
                id: 2,
                name: "Grilled Chicken Breast with Vegetables",
                type: "lunch",
                description: "Lean protein with colorful steamed vegetables",
                image: "🍗",
                ingredients: ["Chicken Breast", "Broccoli", "Carrots", "Olive Oil", "Garlic"],
                instructions: "1. Season chicken\n2. Grill for 20 mins\n3. Steam vegetables",
                nutrition: { protein: 35, carbs: 20, fats: 8, calories: 350 }
            },
            {
                id: 3,
                name: "Greek Salad",
                type: "lunch",
                description: "Fresh vegetables with feta cheese and olive oil dressing",
                image: "🥗",
                ingredients: ["Tomatoes", "Cucumbers", "Feta", "Olives", "Olive Oil"],
                instructions: "1. Chop vegetables\n2. Add feta\n3. Drizzle olive oil",
                nutrition: { protein: 8, carbs: 12, fats: 12, calories: 180 }
            },
            {
                id: 4,
                name: "Salmon with Sweet Potato",
                type: "dinner",
                description: "Omega-3 rich salmon with roasted sweet potato",
                image: "🐟",
                ingredients: ["Salmon", "Sweet Potato", "Lemon", "Olive Oil", "Herbs"],
                instructions: "1. Season salmon\n2. Bake at 400°F\n3. Roast sweet potato",
                nutrition: { protein: 30, carbs: 35, fats: 15, calories: 450 }
            },
            {
                id: 5,
                name: "Protein Smoothie Bowl",
                type: "breakfast",
                description: "Protein-packed smoothie bowl with granola and nuts",
                image: "🍓",
                ingredients: ["Greek Yogurt", "Protein Powder", "Berries", "Granola", "Almonds"],
                instructions: "1. Blend yogurt and protein\n2. Pour into bowl\n3. Top with granola",
                nutrition: { protein: 25, carbs: 40, fats: 8, calories: 380 }
            },
            {
                id: 6,
                name: "Banana with Almonds",
                type: "snack",
                description: "Quick snack combining carbs and protein",
                image: "🍌",
                ingredients: ["Banana", "Almonds", "Honey"],
                instructions: "1. Slice banana\n2. Serve with almonds\n3. Optional honey drizzle",
                nutrition: { protein: 8, carbs: 25, fats: 10, calories: 220 }
            },
            {
                id: 7,
                name: "Pre-Workout Energy Bite",
                type: "pre-workout",
                description: "Quick carbs and electrolytes before training",
                image: "⚡",
                ingredients: ["Dates", "Banana", "Peanut Butter", "Coconut"],
                instructions: "1. Mix dates and banana\n2. Roll in coconut\n3. Eat 30 mins before workout",
                nutrition: { protein: 6, carbs: 35, fats: 8, calories: 250 }
            },
            {
                id: 8,
                name: "Post-Workout Recovery Shake",
                type: "post-workout",
                description: "Protein and carbs for immediate post-workout recovery",
                image: "🥤",
                ingredients: ["Whey Protein", "Rice Cakes", "Banana", "Double Cream Milk"],
                instructions: "1. Blend protein powder\n2. Add banana\n3. Use milk\n4. Drink immediately",
                nutrition: { protein: 30, carbs: 40, fats: 5, calories: 380 }
            },
            {
                id: 9,
                name: "Cottage Cheese with Fruits",
                type: "snack",
                description: "High protein snack with fresh fruits",
                image: "🍑",
                ingredients: ["Cottage Cheese", "Peaches", "Honey", "Granola"],
                instructions: "1. Scoop cottage cheese\n2. Top with peaches\n3. Add honey and granola",
                nutrition: { protein: 15, carbs: 20, fats: 3, calories: 180 }
            },
            {
                id: 10,
                name: "Turkey Wrap",
                type: "lunch",
                description: "Lean deli turkey with fresh vegetables in whole wheat wrap",
                image: "🌯",
                ingredients: ["Turkey Breast", "Whole Wheat Wrap", "Lettuce", "Tomato", "Mustard"],
                instructions: "1. Layer wrap\n2. Add turkey\n3. Add vegetables\n4. Roll tightly",
                nutrition: { protein: 20, carbs: 30, fats: 6, calories: 300 }
            },
            {
                id: 11,
                name: "Steak Power Bowl",
                type: "lunch",
                description: "Grilled ribeye steak with sweet potato, roasted broccoli, and garlic butter sauce",
                image: "🥩",
                ingredients: ["Ribeye Steak", "Sweet Potato", "Broccoli", "Garlic", "Butter", "Sea Salt", "Black Pepper"],
                instructions: "1. Grill ribeye steak\n2. Roast sweet potato and broccoli\n3. Dice steak\n4. Arrange in bowl\n5. Drizzle with garlic butter",
                nutrition: { protein: 38, carbs: 40, fats: 14, calories: 520 }
            },
            {
                id: 12,
                name: "White Fish with Brown Rice",
                type: "dinner",
                description: "Lean white fish with complex carbs",
                image: "🐠",
                ingredients: ["White Fish", "Brown Rice", "Asparagus", "Lemon", "Olive Oil"],
                instructions: "1. Steam fish\n2. Cook brown rice\n3. Steam asparagus",
                nutrition: { protein: 28, carbs: 38, fats: 8, calories: 420 }
            }
        ];

        const recipeServingGramsById = {
            1: 320,
            2: 410,
            3: 280,
            4: 430,
            5: 350,
            6: 190,
            7: 160,
            8: 420,
            9: 230,
            10: 300,
            11: 460,
            12: 390
        };

        function getServingGrams(recipe) {
            return recipe.servingGrams || recipeServingGramsById[recipe.id] || 'N/A';
        }

        let currentFilter = 'all';

        function displayRecipes(recipesToShow) {
            const grid = document.getElementById('recipesGrid');
            grid.innerHTML = '';

            recipesToShow.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card bg-white rounded-lg overflow-hidden shadow-md cursor-pointer';
                card.onclick = () => showRecipeDetail(recipe);

                const typeBadgeClass = {
                    breakfast: 'breakfast-badge',
                    lunch: 'lunch-badge',
                    dinner: 'dinner-badge',
                    snack: 'snack-badge',
                    'pre-workout': 'breakfast-badge',
                    'post-workout': 'lunch-badge'
                }[recipe.type] || 'snack-badge';

                card.innerHTML = `
                    <div class="p-6">
                        <div class="text-5xl mb-3">${recipe.image}</div>
                        <div class="meal-type-badge ${typeBadgeClass}">
                            ${recipe.type.charAt(0).toUpperCase() + recipe.type.slice(1).replace('-', ' ')}
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">${recipe.name}</h3>
                        <p class="text-gray-600 text-sm mb-4">${recipe.description}</p>
                        <div class="text-xs">
                            <span class="nutrition-badge macro-protein">
                                P: ${recipe.nutrition.protein}g
                            </span>
                            <span class="nutrition-badge macro-carbs">
                                C: ${recipe.nutrition.carbs}g
                            </span>
                            <span class="nutrition-badge macro-fats">
                                F: ${recipe.nutrition.fats}g
                            </span>
                            <div class="mt-2 text-gray-700 font-semibold">
                                ${recipe.nutrition.calories} cal • ${getServingGrams(recipe)}g serving
                            </div>
                        </div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function filterRecipes(type) {
            currentFilter = type;

            // Update active badge
            document.querySelectorAll('.filter-badge').forEach(badge => {
                badge.classList.remove('active');
            });
            event.target.classList.add('active');

            // Filter and display
            const filtered = type === 'all' ? recipes : recipes.filter(r => r.type === type);
            displayRecipes(filtered);

            // Search if there's text in search box
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            if (searchText) {
                const searched = filtered.filter(r =>
                    r.name.toLowerCase().includes(searchText) ||
                    r.ingredients.some(i => i.toLowerCase().includes(searchText))
                );
                displayRecipes(searched);
            }
        }

        function searchRecipes() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            let filtered = currentFilter === 'all' ? recipes : recipes.filter(r => r.type === currentFilter);

            const searched = filtered.filter(r =>
                r.name.toLowerCase().includes(searchText) ||
                r.description.toLowerCase().includes(searchText) ||
                r.ingredients.some(i => i.toLowerCase().includes(searchText))
            );

            displayRecipes(searched);
        }

        function showRecipeDetail(recipe) {
            const modal = document.getElementById('recipeModal');
            const content = document.getElementById('modalContent');

            const typeBadgeClass = {
                breakfast: 'breakfast-badge',
                lunch: 'lunch-badge',
                dinner: 'dinner-badge',
                snack: 'snack-badge',
                'pre-workout': 'breakfast-badge',
                'post-workout': 'lunch-badge'
            }[recipe.type] || 'snack-badge';

            content.innerHTML = `
                <div>
                    <div class="text-6xl mb-4">${recipe.image}</div>
                    <div class="meal-type-badge ${typeBadgeClass}">
                        ${recipe.type.charAt(0).toUpperCase() + recipe.type.slice(1).replace('-', ' ')}
                    </div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-3">${recipe.name}</h2>
                    <p class="text-gray-600 mb-6">${recipe.description}</p>
                    <p class="text-gray-500 font-semibold mb-6">Serving Size: ${getServingGrams(recipe)}g</p>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-red-50 p-4 rounded-lg">
                            <div class="text-sm text-gray-600">Protein</div>
                            <div class="text-2xl font-bold text-red-600">${recipe.nutrition.protein}g</div>
                        </div>
                        <div class="bg-yellow-50 p-4 rounded-lg">
                            <div class="text-sm text-gray-600">Carbs</div>
                            <div class="text-2xl font-bold text-yellow-600">${recipe.nutrition.carbs}g</div>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-lg">
                            <div class="text-sm text-gray-600">Fats</div>
                            <div class="text-2xl font-bold text-blue-600">${recipe.nutrition.fats}g</div>
                        </div>
                        <div class="bg-purple-50 p-4 rounded-lg">
                            <div class="text-sm text-gray-600">Calories</div>
                            <div class="text-2xl font-bold text-purple-600">${recipe.nutrition.calories}</div>
                        </div>
                    </div>

                    <div class="mb-6">
                        <h3 class="text-lg font-bold text-gray-800 mb-3">Ingredients</h3>
                        <ul class="space-y-2">
                            ${recipe.ingredients.map(ing => `<li class="text-gray-700">✓ ${ing}</li>`).join('')}
                        </ul>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold text-gray-800 mb-3">Instructions</h3>
                        <p class="text-gray-700 whitespace-pre-wrap">${recipe.instructions}</p>
                    </div>
                </div>
            `;

            modal.classList.remove('hidden');
        }

        function closeRecipeModal() {
            const modal = document.getElementById('recipeModal');
            modal.classList.add('hidden');
        }

        // Search input listener
        document.getElementById('searchInput').addEventListener('input', searchRecipes);

        // Close modal when clicking outside
        document.getElementById('recipeModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeRecipeModal();
            }
        });

        // Initialize
        displayRecipes(recipes);
    </script>
</body>
</html>
