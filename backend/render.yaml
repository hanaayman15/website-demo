services:
  - type: web
    name: nutrition-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      # CRITICAL: Set these in Render Dashboard (do not commit actual values)
      - key: DATABASE_URL
        sync: false  # Set manually in Render Dashboard
      - key: SECRET_KEY
        sync: false  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"
      - key: ADMIN_EMAIL
        sync: false  # Your admin email
      - key: ADMIN_PASSWORD
        sync: false  # Strong password (8+ chars)
      - key: FRONTEND_URL
        sync: false  # Your Vercel deployment URL
      
      # Production defaults
      - key: DEBUG
        value: "False"
      - key: TRUSTED_HOSTS
        value: "*"
      
      # Database pool settings
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_MAX_OVERFLOW
        value: "10"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: DB_POOL_RECYCLE
        value: "3600"
      
      # Logging
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_FORMAT
        value: "json"
      
      # Security
      - key: RATE_LIMIT_ENABLED
        value: "True"
      - key: LOGIN_RATE_LIMIT
        value: "5 per minute"
      
      # JWT
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
