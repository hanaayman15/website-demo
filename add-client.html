<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Client - Basic Information</title>
    <script src="config.js"></script>
    <script src="country-phone-codes.js"></script>
    <style>
        :root {
            --ink: #17324b;
            --line: #dbe7f3;
            --bg: #eef5fb;
            --brand: #4a9ff5;
            --brand-dark: #2f80d5;
            --danger: #b42318;
        }
        body {
            margin: 0;
            font-family: "Source Sans Pro", Arial, sans-serif;
            background: var(--bg);
            color: var(--ink);
        }
        .page {
            max-width: 1000px;
            margin: 22px auto;
            padding: 0 16px 28px;
        }
        .top-nav {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .top-nav a {
            text-decoration: none;
            color: var(--ink);
            font-weight: 700;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 7px 10px;
            background: #f4f8fd;
        }

        .mobile-menu-btn {
            display: none;
        }
        .card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(15, 42, 64, 0.08);
            padding: 16px;
        }
        h1 {
            margin: 0 0 6px;
            font-size: 30px;
        }
        .subtitle {
            margin: 0 0 14px;
            color: #5f748a;
        }
        .section-title {
            margin: 0 0 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #d3e5f8;
            font-size: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field.full {
            grid-column: span 2;
        }
        label {
            font-size: 13px;
            font-weight: 700;
        }
        input, select {
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 10px 11px;
            font-size: 14px;
        }
        .phone-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .actions {
            margin-top: 14px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .btn {
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: #f4f8fd;
            color: var(--ink);
        }
        .btn.primary {
            border-color: var(--brand);
            background: var(--brand);
            color: #fff;
        }
        .btn.primary:hover {
            background: var(--brand-dark);
        }
        .alert {
            margin-top: 10px;
            border-radius: 9px;
            padding: 9px 11px;
            font-size: 13px;
            display: none;
        }
        .alert.show {
            display: block;
        }
        .alert.error {
            background: #fff2f1;
            border: 1px solid #ffd1ce;
            color: var(--danger);
        }
        .alert.success {
            background: #eefaf2;
            border: 1px solid #cdeed8;
            color: #1d6e3b;
        }
        .help {
            font-size: 12px;
            color: #5f748a;
        }
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .top-nav-links {
                width: 100%;
                display: none !important;
                flex-direction: column;
                gap: 6px;
                border-top: 1px solid #edf2f8;
                padding-top: 10px;
                margin-top: 2px;
            }

            .top-nav-links.mobile-open {
                display: flex !important;
            }

            .top-nav a {
                width: 100%;
                text-align: center;
            }

            .grid { grid-template-columns: 1fr; }
            .field.full { grid-column: span 1; }
            .phone-row { grid-template-columns: 1fr; }

            .actions {
                flex-direction: column;
            }

            .actions .btn {
                width: 100%;
            }
        }

        @media (max-width: 390px) {
            .page {
                margin: 12px auto;
                padding: 0 10px 18px;
            }

            .card {
                padding: 12px;
            }

            h1 {
                font-size: 24px;
            }

            input, select, .btn {
                font-size: 16px;
            }
        }
    </style>
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <link rel="stylesheet" href="assets/css/dashboard-template.css" />
</head>
<body>
    <div class="page">
        <div class="top-nav">
            <a href="#" onclick="window.history.back(); return false;">← Back</a>
            <div style="font-weight:800;">Add New Client</div>
            <div class="top-nav-links">
                <a href="index.html">Home</a>
                <a href="clients.html">Clients</a>
                <a href="add_team.html">Add Team</a>
            </div>
        </div>

        <div class="card">
            <h1>Add New Client</h1>
            <p class="subtitle">Basic Information only</p>

            <h2 class="section-title">Basic Information</h2>
            <form id="basicForm" autocomplete="on">
                <div class="grid">
                    <div class="field">
                        <label for="clientId">Client ID (auto-generated)</label>
                        <input id="clientId" type="text" readonly value="Auto" />
                    </div>

                    <div class="field">
                        <label for="fullName">Full Name</label>
                        <input id="fullName" name="fullName" autocomplete="name" type="text" required placeholder="At least 4 names" />
                        <div class="help">Must contain at least 4 names.</div>
                    </div>

                    <div class="field full">
                        <label>Phone</label>
                        <div class="phone-row">
                            <select id="phoneCountryCode" name="phoneCountryCode" autocomplete="tel-country-code"></select>
                            <input id="phoneNumber" name="phoneNumber" autocomplete="tel-national" type="text" required inputmode="numeric" placeholder="Phone number" />
                        </div>
                    </div>

                    <div class="field">
                        <label for="email">Email Address</label>
                        <input id="email" name="email" autocomplete="email" type="email" required placeholder="client@example.com" />
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" autocomplete="new-password" type="password" minlength="6" required placeholder="Minimum 6 characters" />
                    </div>

                    <div class="field">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="birthday">Birthday (dd/mm/yyyy)</label>
                        <input id="birthday" name="birthday" autocomplete="bday" type="date" required />
                    </div>

                    <div class="field">
                        <label for="country">Country</label>
                        <select id="country" name="country" autocomplete="country-name" required>
                            <option value="">Select country</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="club">Sport Club</label>
                        <input id="club" name="club" autocomplete="organization" type="text" placeholder="Club name" />
                    </div>

                    <div class="field">
                        <label for="religion">Religion</label>
                        <select id="religion" name="religion">
                            <option value="">Select religion</option>
                            <option value="Islam">Islam</option>
                            <option value="Christianity">Christianity</option>
                            <option value="Judaism">Judaism</option>
                            <option value="Hinduism">Hinduism</option>
                            <option value="Buddhism">Buddhism</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn" type="button" onclick="window.location.href='clients.html'">Cancel</button>
                    <button class="btn" type="button" id="autofillBtn">Autofill</button>
                    <button class="btn primary" type="submit" id="saveBtn">Save</button>
                </div>
            </form>

            <div id="formAlert" class="alert"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL) ? CONFIG.API_BASE_URL : 'http://127.0.0.1:8011';
        const queryParams = new URLSearchParams(window.location.search);
        const editClientId = queryParams.get('client_id');
        const isEditMode = !!editClientId;
        const AUTOFILL_KEY = 'addClientBasicAutofillV1';
        const LAST_CLIENT_CONTEXT_KEY = 'lastClientContextV1';

        const WORLD_COUNTRIES = [
            'Egypt','Saudi Arabia','United Arab Emirates','Jordan','Qatar','Kuwait','Bahrain','Oman',
            'Morocco','Tunisia','Algeria','Libya','Sudan','United States','United Kingdom','Germany',
            'France','Italy','Spain','Canada','Australia','Turkey','India','Pakistan'
        ];

        function showAlert(type, message) {
            const alertEl = document.getElementById('formAlert');
            alertEl.className = `alert show ${type}`;
            alertEl.textContent = message;
        }

        function formatApiError(detail, fallbackMessage) {
            if (!detail) return fallbackMessage;
            if (typeof detail === 'string') return detail;
            if (Array.isArray(detail)) {
                const messages = detail
                    .map((item) => {
                        if (!item) return '';
                        if (typeof item === 'string') return item;
                        const location = Array.isArray(item.loc) ? item.loc.join('.') : '';
                        const message = item.msg || item.message || '';
                        return [location, message].filter(Boolean).join(': ');
                    })
                    .filter(Boolean);
                return messages.length ? messages.join(' | ') : fallbackMessage;
            }
            if (typeof detail === 'object') {
                return detail.message || JSON.stringify(detail);
            }
            return fallbackMessage;
        }

        function normalizeDisplayGender(value) {
            const normalized = String(value || '').trim().toLowerCase();
            if (!normalized) return 'N/A';
            return normalized.charAt(0).toUpperCase() + normalized.slice(1);
        }

        function calculateAgeFromBirthday(birthday) {
            if (!birthday) return 'N/A';
            const birthDate = new Date(birthday);
            if (Number.isNaN(birthDate.getTime())) return 'N/A';
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age -= 1;
            }
            return Number.isFinite(age) && age >= 0 && age <= 100 ? age : 'N/A';
        }

        function syncClientCachesAfterBasicSave(responseData, payload) {
            const userId = String(editClientId || responseData.user_id || '');
            const displayId = String(responseData.display_id || responseData.client_id || '');
            const phone = `${payload.phone_country_code || ''}${payload.phone_number || ''}`.trim() || 'N/A';
            const age = calculateAgeFromBirthday(payload.birthday);

            const snapshot = {
                id: Number(userId) || responseData.user_id || null,
                displayId: Number(displayId) || responseData.display_id || null,
                name: payload.full_name || 'Unknown',
                full_name: payload.full_name || 'Unknown',
                email: payload.email || 'N/A',
                phone,
                birthday: payload.birthday || 'N/A',
                age,
                gender: normalizeDisplayGender(payload.gender),
                country: payload.country || 'N/A',
                club: payload.club || 'N/A',
                religion: payload.religion || 'N/A',
            };

            [userId, displayId]
                .filter(Boolean)
                .forEach((key) => {
                    const storageKey = `clientData_${key}`;
                    try {
                        const existing = JSON.parse(localStorage.getItem(storageKey) || '{}') || {};
                        localStorage.setItem(storageKey, JSON.stringify({ ...existing, ...snapshot }));
                    } catch (_) {
                        localStorage.setItem(storageKey, JSON.stringify(snapshot));
                    }
                });

            try {
                const clients = JSON.parse(localStorage.getItem('clients') || '[]');
                if (Array.isArray(clients)) {
                    const updatedClients = clients.map((client) => {
                        if (Number(client?.id) !== Number(userId) && Number(client?.display_id) !== Number(displayId)) {
                            return client;
                        }
                        return {
                            ...client,
                            id: Number(userId) || client.id,
                            display_id: Number(displayId) || client.display_id,
                            full_name: payload.full_name || client.full_name,
                            email: payload.email || client.email,
                            phone,
                            age,
                            gender: payload.gender || client.gender,
                            country: payload.country || client.country,
                            club: payload.club || client.club,
                            religion: payload.religion || client.religion,
                            birthday: payload.birthday || client.birthday,
                        };
                    });
                    localStorage.setItem('clients', JSON.stringify(updatedClients));
                }
            } catch (_) {}
        }

        function fullNameIsValid(value) {
            const parts = String(value || '').trim().split(/\s+/).filter(Boolean);
            return parts.length >= 4;
        }

        function getAuthHeader() {
            const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken') || localStorage.getItem('token');
            if (!token) return null;
            const tokenType = localStorage.getItem('authTokenType') || sessionStorage.getItem('authTokenType') || 'bearer';
            return `${tokenType.charAt(0).toUpperCase() + tokenType.slice(1)} ${token}`;
        }

        function populatePhoneCodes() {
            const select = document.getElementById('phoneCountryCode');
            const options = Array.isArray(window.COUNTRY_DIAL_OPTIONS) ? window.COUNTRY_DIAL_OPTIONS : [
                { country: 'Egypt', dial: '+20', display: 'Egypt +20' },
                { country: 'Saudi Arabia', dial: '+966', display: 'Saudi Arabia +966' },
                { country: 'United Arab Emirates', dial: '+971', display: 'UAE +971' }
            ];

            select.innerHTML = '';
            options.forEach((item) => {
                const option = document.createElement('option');
                option.value = item.dial || '+20';
                option.textContent = item.display || `${item.country} ${item.dial}`;
                select.appendChild(option);
            });
            select.value = '+20';
        }

        function populateCountries() {
            const country = document.getElementById('country');
            WORLD_COUNTRIES.forEach((name) => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                country.appendChild(option);
            });
            country.value = 'Egypt';
        }

        function persistAutofillDraft() {
            const draft = {
                full_name: document.getElementById('fullName').value.trim(),
                phone_country_code: document.getElementById('phoneCountryCode').value || '+20',
                phone_number: document.getElementById('phoneNumber').value.replace(/\D/g, ''),
                email: document.getElementById('email').value.trim().toLowerCase(),
                gender: document.getElementById('gender').value,
                birthday: document.getElementById('birthday').value,
                country: document.getElementById('country').value,
                club: document.getElementById('club').value.trim(),
                religion: document.getElementById('religion').value,
            };
            localStorage.setItem(AUTOFILL_KEY, JSON.stringify(draft));
        }

        function getFallbackAutofill() {
            const now = Date.now();
            return {
                full_name: 'Auto Filled Client Profile Name',
                phone_country_code: '+20',
                phone_number: '1000000000',
                email: `autofill_${now}@example.com`,
                gender: 'male',
                birthday: '2000-01-01',
                country: 'Egypt',
                club: 'Auto Club',
                religion: 'Other',
            };
        }

        function loadAutofillDraft(force = false) {
            if (isEditMode) return;
            try {
                const raw = localStorage.getItem(AUTOFILL_KEY);
                const parsed = raw ? JSON.parse(raw) : null;
                const draft = (parsed && typeof parsed === 'object') ? parsed : {};
                const fallback = getFallbackAutofill();

                const setIfMissing = (id, value, defaults = [], fallbackValue = '') => {
                    const finalValue = (value !== null && value !== undefined && value !== '') ? value : fallbackValue;
                    if (finalValue === null || finalValue === undefined || finalValue === '') return;
                    const el = document.getElementById(id);
                    if (!el) return;
                    const current = String(el.value || '').trim();
                    const missing = current === '' || defaults.includes(current);
                    if (missing || force) el.value = String(finalValue);
                };

                setIfMissing('fullName', draft.full_name, [], fallback.full_name);
                setIfMissing('phoneCountryCode', draft.phone_country_code, ['+20'], fallback.phone_country_code);
                setIfMissing('phoneNumber', draft.phone_number, [], fallback.phone_number);
                setIfMissing('email', draft.email, [], fallback.email);
                setIfMissing('gender', draft.gender, [''], fallback.gender);
                setIfMissing('birthday', draft.birthday, [''], fallback.birthday);
                setIfMissing('country', draft.country, ['Egypt'], fallback.country);
                setIfMissing('club', draft.club, [], fallback.club);
                setIfMissing('religion', draft.religion, [''], fallback.religion);

                if (!isEditMode) {
                    const passwordEl = document.getElementById('password');
                    if (passwordEl && (force || !String(passwordEl.value || '').trim())) {
                        passwordEl.value = 'Client@123';
                    }
                }
            } catch (_) {}
        }

        function runAutofillNow() {
            loadAutofillDraft(true);
            persistAutofillDraft();
            showAlert('success', 'Autofill completed for all missing basic fields.');
        }

        function applyEditModeUI() {
            if (!isEditMode) return;
            document.title = 'Edit Client - Basic Information';
            const heading = document.querySelector('h1');
            if (heading) heading.textContent = 'Edit Client';
            const subtitle = document.querySelector('.subtitle');
            if (subtitle) subtitle.textContent = 'Update Basic Information';
            const topTitle = document.querySelector('.top-nav > div[style*="font-weight:800"]');
            if (topTitle) topTitle.textContent = 'Edit Client';
            const password = document.getElementById('password');
            if (password) {
                password.required = false;
                password.value = '';
                password.placeholder = 'Leave blank when editing';
                password.disabled = true;
            }
            const saveBtn = document.getElementById('saveBtn');
            if (saveBtn) saveBtn.textContent = 'Update';
        }

        function setFieldValue(id, value) {
            if (value === null || value === undefined) return;
            const el = document.getElementById(id);
            if (el) el.value = String(value);
        }

        async function loadBasicForEdit() {
            if (!isEditMode) return;
            try {
                const headers = {};
                const authHeader = getAuthHeader();
                if (authHeader) headers.Authorization = authHeader;

                const response = await fetch(`${API_BASE_URL}/api/admin/clients/${encodeURIComponent(editClientId)}/basic`, {
                    credentials: 'include',
                    headers,
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    showAlert('error', data.detail || 'Failed to load client basic info.');
                    return;
                }

                setFieldValue('clientId', data.display_id || data.client_id || data.user_id || 'Auto');
                setFieldValue('fullName', data.full_name);
                setFieldValue('phoneCountryCode', data.phone_country_code || '+20');
                setFieldValue('phoneNumber', data.phone_number);
                setFieldValue('email', data.email);
                setFieldValue('gender', data.gender);
                setFieldValue('birthday', data.birthday);
                setFieldValue('country', data.country);
                setFieldValue('club', data.club);
                setFieldValue('religion', data.religion);
            } catch (error) {
                showAlert('error', `Unable to load client: ${error.message}`);
            }
        }

        async function saveBasicInfo(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            if (!fullNameIsValid(fullName)) {
                showAlert('error', 'Full Name must contain at least 4 names.');
                return;
            }

            const phoneNumber = document.getElementById('phoneNumber').value.replace(/\D/g, '');
            if (!phoneNumber) {
                showAlert('error', 'Phone Number is required.');
                return;
            }

            const payload = {
                full_name: fullName,
                phone_country_code: document.getElementById('phoneCountryCode').value || '+20',
                phone_number: phoneNumber,
                email: document.getElementById('email').value.trim().toLowerCase(),
                gender: document.getElementById('gender').value,
                birthday: document.getElementById('birthday').value,
                country: document.getElementById('country').value,
                club: document.getElementById('club').value.trim() || null,
                religion: document.getElementById('religion').value || null,
                source: 'add_client'
            };

            if (!isEditMode) {
                payload.password = document.getElementById('password').value;
            }

            try {
                const headers = { 'Content-Type': 'application/json' };
                const authHeader = getAuthHeader();
                if (authHeader) headers.Authorization = authHeader;

                const url = isEditMode
                    ? `${API_BASE_URL}/api/admin/clients/${encodeURIComponent(editClientId)}/basic`
                    : `${API_BASE_URL}/api/client`;
                const method = isEditMode ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    credentials: 'include',
                    headers,
                    body: JSON.stringify(payload)
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    showAlert('error', formatApiError(data.detail, 'Failed to save client.'));
                    return;
                }

                document.getElementById('clientId').value = String(data.display_id || data.client_id || data.user_id || 'Auto');
                persistAutofillDraft();
                syncClientCachesAfterBasicSave(data, payload);
                localStorage.setItem(LAST_CLIENT_CONTEXT_KEY, JSON.stringify({
                    user_id: editClientId || data.user_id || null,
                    display_id: data.display_id || null,
                    full_name: payload.full_name || '',
                    email: payload.email || '',
                    source: 'add_client'
                }));
                showAlert('success', isEditMode ? 'Basic information updated successfully.' : 'Client basic information saved successfully. Redirecting to services...');
                setTimeout(() => {
                    const targetClientId = editClientId || data.user_id;
                    window.location.href = `client-services.html?client_id=${encodeURIComponent(targetClientId)}`;
                }, isEditMode ? 300 : 600);
            } catch (error) {
                showAlert('error', `Unable to save: ${error.message}`);
            }
        }

        document.getElementById('basicForm').addEventListener('submit', saveBasicInfo);
        populatePhoneCodes();
        populateCountries();
        applyEditModeUI();
        loadBasicForEdit();
        loadAutofillDraft();

        const autofillBtn = document.getElementById('autofillBtn');
        if (autofillBtn) {
            autofillBtn.addEventListener('click', runAutofillNow);
        }

        ['fullName', 'phoneCountryCode', 'phoneNumber', 'email', 'gender', 'birthday', 'country', 'club', 'religion']
            .forEach((id) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('input', persistAutofillDraft);
                el.addEventListener('change', persistAutofillDraft);
            });
    </script>
    <script src="assets/js/responsive-ui.js"></script>
</body>
</html>
