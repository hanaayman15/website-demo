<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Nutrition Profile</title>
    <script src="config.js"></script>
    <style>
        :root { --ink:#17324b; --line:#dbe7f3; --bg:#eef5fb; --brand:#4a9ff5; --brand-dark:#2f80d5; }
        body { margin:0; font-family:"Source Sans Pro",Arial,sans-serif; background:var(--bg); color:var(--ink); }
        .page { max-width:1150px; margin:20px auto; padding:0 14px 24px; }
        .top { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
        .top a { text-decoration:none; color:var(--ink); border:1px solid var(--line); background:#f4f8fd; border-radius:9px; padding:8px 11px; font-weight:700; }
        .card { background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:0 8px 20px rgba(15,42,64,.08); padding:14px; margin-bottom:12px; }
        .section-title { margin:0 0 10px; padding-bottom:6px; border-bottom:2px solid #d3e5f8; font-size:18px; }
        .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
        .field { display:flex; flex-direction:column; gap:6px; }
        .field.full { grid-column: span 3; }
        label { font-size:13px; font-weight:700; }
        input, select, textarea { border:1px solid var(--line); border-radius:9px; padding:10px 11px; font-size:14px; }
        textarea { min-height:74px; resize:vertical; }
        .row-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; }
        .btn { border:1px solid var(--line); background:#f4f8fd; color:var(--ink); border-radius:9px; padding:10px 14px; font-weight:700; cursor:pointer; }
        .btn.primary { border-color:var(--brand); background:var(--brand); color:#fff; }
        .btn.primary:hover { background:var(--brand-dark); }
        .sublist { border:1px dashed #cadbf0; border-radius:9px; background:#f8fbff; padding:9px; margin-top:8px; }
        .subitem { border:1px solid #d7e6f7; border-radius:10px; background:#fff; padding:10px; margin-bottom:10px; }
        .subitem h4 { margin:0 0 8px; font-size:14px; color:#1b3f61; }
        .days-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; margin-top:6px; }
        .day-chip { display:flex; align-items:center; gap:4px; justify-content:center; border:1px solid #d7e6f7; border-radius:8px; padding:6px 4px; font-size:12px; background:#f8fbff; }
        .time-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
        .subitem-actions { display:flex; justify-content:flex-end; margin-top:8px; }
        .alert { margin-top:10px; border-radius:9px; padding:9px 11px; font-size:13px; display:none; }
        .alert.show { display:block; }
        .alert.error { background:#fff2f1; border:1px solid #ffd1ce; color:#b42318; }
        .alert.success { background:#eefaf2; border:1px solid #cdeed8; color:#1d6e3b; }
        @media (max-width:980px){ .grid{grid-template-columns:repeat(2,minmax(0,1fr));} .field.full{grid-column:span 2;} }
        @media (max-width:640px){ .grid{grid-template-columns:1fr;} .field.full{grid-column:span 1;} .days-grid{grid-template-columns:repeat(2,minmax(0,1fr));} .time-grid{grid-template-columns:1fr;} }
    </style>
</head>
<body>
    <div class="page">
        <div class="top">
            <h1>Nutrition Profile</h1>
            <a id="backToServices" href="client-services.html">← Back</a>
        </div>

        <form id="nutritionForm">
            <div class="card">
                <h2 class="section-title">Physical Measurements</h2>
                <div class="grid">
                    <div class="field"><label>Height (cm)</label><input type="number" step="0.1" id="height"></div>
                    <div class="field"><label>Weight (kg)</label><input type="number" step="0.1" id="weight"></div>
                    <div class="field"><label>BMI (Calc / Auto)</label><input type="number" step="0.1" id="bmi" readonly></div>
                    <div class="field"><label>Body Fat %</label><input type="number" step="0.1" id="bodyFat"></div>
                    <div class="field"><label>Skeletal Muscle (kg)</label><input type="number" step="0.1" id="skeletalMuscle"></div>
                    <div class="field"><label>Body Fat Mass (Auto)</label><input type="number" step="0.1" id="bodyFatMass" readonly></div>
                    <div class="field"><label>Muscle % (Auto)</label><input type="number" step="0.1" id="musclePercent" readonly></div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">Metabolism & Activity</h2>
                <div class="grid">
                    <div class="field"><label>BMR (Calc)</label><input type="number" step="0.1" id="bmr" readonly></div>
                    <div class="field"><label>Activity Level</label><select id="activityLevel"><option value="extremely_active" selected>Extremely Active</option><option value="very_active">Very Active</option><option value="moderately_active">Moderately Active</option><option value="lightly_active">Lightly Active</option><option value="sedentary">Sedentary</option></select></div>
                    <div class="field"><label>Sports</label><input id="sport"></div>
                    <div class="field"><label>Position</label><input id="position"></div>
                    <div class="field"><label>TDEE (Calc)</label><input type="number" step="0.1" id="tdee" readonly></div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">Nutrition Plan</h2>
                <div class="grid">
                    <div class="field"><label>Progression Type</label><select id="progressionType" onchange="handleProgressionTypeChange()"><option value="">Select</option><option value="cut">Cut</option><option value="maintain">Maintain</option><option value="bulk">Bulk</option></select></div>
                    <div class="field"><label id="caloriesLabel" for="calories">Calories</label><input type="number" step="0.1" id="calories" readonly></div>
                    <div class="field"><label>Protein (g) (Calc)</label><input type="number" step="0.1" id="protein" readonly></div>
                    <div class="field"><label>Carbs (g) (Calc)</label><input type="number" step="0.1" id="carbs" readonly></div>
                    <div class="field"><label>Fats (g) (Calc)</label><input type="number" step="0.1" id="fats" readonly></div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">Hydration</h2>
                <div class="grid">
                    <div class="field"><label>Water (from InBody) (L)</label><input type="number" step="0.1" id="waterInBody"></div>
                    <div class="field"><label>Water Intake (daily liters) (Calc)</label><input type="number" step="0.1" id="waterIntake" readonly></div>
                    <div class="field"><label>Minerals (from InBody)</label><input type="number" step="0.1" id="minerals"></div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">Health & Observations</h2>
                <div class="grid">
                    <div class="field full"><label>Test and Record</label><textarea id="testRecord"></textarea></div>
                    <div class="field full"><label>Injuries</label><textarea id="injuries"></textarea></div>
                    <div class="field full"><label>Mental Notes</label><textarea id="mentalNotes"></textarea></div>
                    <div class="field"><label>Food Allergies</label><input id="foodAllergies"></div>
                    <div class="field full"><label>Medical Notes</label><textarea id="medicalNotes"></textarea></div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">Food Preferences</h2>
                <div class="grid">
                    <div class="field full"><label>Food Likes</label><textarea id="foodLikes"></textarea></div>
                    <div class="field full"><label>Food Dislikes</label><textarea id="foodDislikes"></textarea></div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">Goals & Timeline</h2>
                <div class="grid">
                    <div class="field"><label>Competition (default: None)</label><select id="competition"><option value="none" selected>None</option><option value="set">Set date</option></select></div>
                    <div class="field"><label>Competition Date</label><input type="date" id="competitionDate"></div>
                    <div class="field"><label>Days Left (Calc)</label><input type="number" id="daysLeft" readonly></div>
                    <div class="field"><label>Goal Weight (kg)</label><input type="number" step="0.1" id="goalWeight"></div>
                    <div class="field full"><label>Additional Notes</label><textarea id="additionalNotes"></textarea></div>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">Training Schedule</h2>
                <button class="btn" type="button" id="addTrainingBtn">+ Add Training Session</button>
                <div id="trainingList" class="sublist"></div>
            </div>

            <div class="card">
                <h2 class="section-title">Supplements</h2>
                <button class="btn" type="button" id="addSupplementBtn">+ Add Supplement</button>
                <div id="supplementList" class="sublist"></div>
            </div>

            <div class="card">
                <div class="row-actions">
                    <button class="btn" type="button" id="autofillBtn">Autofill</button>
                    <button class="btn" type="button" id="recalcBtn">Recalculate</button>
                    <button class="btn primary" type="submit">Save Nutrition Profile</button>
                </div>
                <div id="formAlert" class="alert"></div>
            </div>
        </form>
    </div>

    <script>
        const API_BASE_URL = (typeof CONFIG !== 'undefined' && CONFIG.API_BASE_URL) ? CONFIG.API_BASE_URL : 'http://127.0.0.1:8011';
        const params = new URLSearchParams(window.location.search);
        const clientId = params.get('client_id');
        const AUTOFILL_KEY = `nutritionProfileAutofillV1_${clientId || 'default'}`;

        if (!clientId) {
            alert('Missing client id');
            window.location.href = 'clients.html';
        }

        document.getElementById('backToServices').href = `client-services.html?client_id=${encodeURIComponent(clientId || '')}`;

        const fields = {
            height: document.getElementById('height'),
            weight: document.getElementById('weight'),
            bmi: document.getElementById('bmi'),
            bodyFat: document.getElementById('bodyFat'),
            skeletalMuscle: document.getElementById('skeletalMuscle'),
            bodyFatMass: document.getElementById('bodyFatMass'),
            musclePercent: document.getElementById('musclePercent'),
            bmr: document.getElementById('bmr'),
            activityLevel: document.getElementById('activityLevel'),
            sport: document.getElementById('sport'),
            position: document.getElementById('position'),
            tdee: document.getElementById('tdee'),
            progressionType: document.getElementById('progressionType'),
            calories: document.getElementById('calories'),
            protein: document.getElementById('protein'),
            carbs: document.getElementById('carbs'),
            fats: document.getElementById('fats'),
            waterInBody: document.getElementById('waterInBody'),
            waterIntake: document.getElementById('waterIntake'),
            minerals: document.getElementById('minerals'),
            testRecord: document.getElementById('testRecord'),
            injuries: document.getElementById('injuries'),
            mentalNotes: document.getElementById('mentalNotes'),
            foodAllergies: document.getElementById('foodAllergies'),
            medicalNotes: document.getElementById('medicalNotes'),
            foodLikes: document.getElementById('foodLikes'),
            foodDislikes: document.getElementById('foodDislikes'),
            competition: document.getElementById('competition'),
            competitionDate: document.getElementById('competitionDate'),
            daysLeft: document.getElementById('daysLeft'),
            goalWeight: document.getElementById('goalWeight'),
            additionalNotes: document.getElementById('additionalNotes'),
        };

        function getAuthHeader() {
            const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken') || localStorage.getItem('token');
            if (!token) return null;
            const tokenType = localStorage.getItem('authTokenType') || sessionStorage.getItem('authTokenType') || 'bearer';
            return `${tokenType.charAt(0).toUpperCase() + tokenType.slice(1)} ${token}`;
        }

        function showAlert(type, message) {
            const el = document.getElementById('formAlert');
            el.className = `alert show ${type}`;
            el.textContent = message;
        }

        function num(v) {
            const n = Number(v);
            return Number.isFinite(n) ? n : null;
        }

        function getCalculatedCalories(tdee, progression) {
            if (!tdee) return null;
            if (progression === 'cut') return tdee - 500;
            if (progression === 'maintain') return tdee;
            if (progression === 'bulk') return tdee + 500;
            return null;
        }

        function getCaloriesLabel(progression) {
            if (progression === 'cut') return 'Cut Calories';
            if (progression === 'maintain') return 'Maintain Calories';
            if (progression === 'bulk') return 'Bulk Calories';
            return 'Calories';
        }

        function handleProgressionTypeChange() {
            recalc();
            persistNutritionDraft();
        }

        function recalc() {
            const height = num(fields.height.value);
            const weight = num(fields.weight.value);
            const bodyFat = num(fields.bodyFat.value);
            const skeletal = num(fields.skeletalMuscle.value);

            if (height && weight && height > 0) {
                fields.bmi.value = (weight / Math.pow(height / 100, 2)).toFixed(1);
            }
            if (weight && bodyFat != null) {
                fields.bodyFatMass.value = ((weight * bodyFat) / 100).toFixed(1);
            }
            if (weight && skeletal != null && weight > 0) {
                fields.musclePercent.value = ((skeletal / weight) * 100).toFixed(1);
            }

            const bmi = num(fields.bmi.value);
            if (weight && height) {
                fields.bmr.value = (10 * weight + 6.25 * height - 120 + 5).toFixed(1);
            }

            const factors = {
                sedentary: 1.2,
                lightly_active: 1.375,
                moderately_active: 1.55,
                very_active: 1.725,
                extremely_active: 1.9,
            };
            const bmr = num(fields.bmr.value);
            const factor = factors[fields.activityLevel.value] || 1.9;
            if (bmr) {
                fields.tdee.value = (bmr * factor).toFixed(1);
            }

            const tdee = num(fields.tdee.value);
            const progression = fields.progressionType.value;
            const calories = getCalculatedCalories(tdee, progression);
            const caloriesLabel = document.getElementById('caloriesLabel');
            if (caloriesLabel) {
                caloriesLabel.textContent = getCaloriesLabel(progression);
            }
            fields.calories.value = calories != null ? calories.toFixed(1) : '';

            if (calories != null) {
                const protein = (weight || 0) * 2;
                const fats = (weight || 0) * 0.8;
                const carbs = Math.max((calories - (protein * 4 + fats * 9)) / 4, 0);
                fields.protein.value = protein ? protein.toFixed(1) : '';
                fields.fats.value = fats ? fats.toFixed(1) : '';
                fields.carbs.value = carbs ? carbs.toFixed(1) : '';
            } else {
                fields.protein.value = '';
                fields.fats.value = '';
                fields.carbs.value = '';
            }

            if (weight) {
                fields.waterIntake.value = (weight * 0.035).toFixed(1);
            }

            if (fields.competitionDate.value) {
                const now = new Date();
                const target = new Date(fields.competitionDate.value);
                const days = Math.ceil((target.getTime() - now.getTime()) / (1000 * 60 * 60 * 24));
                fields.daysLeft.value = Number.isFinite(days) ? Math.max(days, 0) : '';
            }
        }

        function addTrainingSessionItem(data = {}) {
            const container = document.getElementById('trainingList');
            const count = container.querySelectorAll('.subitem').length + 1;
            const days = Array.isArray(data.days) ? data.days : [];
            const row = document.createElement('div');
            row.className = 'subitem';
            row.innerHTML = `
                <h4>Training Session ${count}</h4>
                <div class="grid">
                    <div class="field"><label>Training Name</label><input class="training-name" value="${data.name || data.session || ''}" placeholder="Training Name" /></div>
                    <div class="field"><label>Training Type</label><select class="training-type"><option value="low">Low</option><option value="moderate">Moderate</option><option value="high">High</option></select></div>
                    <div class="field full">
                        <label>Days</label>
                        <div class="days-grid">
                            ${['Mo','Tue','Wed','Thu','Fri','Sat','Sun'].map((d) => `<label class="day-chip"><input type="checkbox" value="${d}" ${days.includes(d) ? 'checked' : ''}>${d}</label>`).join('')}
                        </div>
                    </div>
                    <div class="field full">
                        <label>Start Time</label>
                        <div class="time-grid">
                            <select class="start-hour">${Array.from({length:12}, (_,i) => i + 1).map((h) => `<option value="${String(h).padStart(2,'0')}">${String(h).padStart(2,'0')}</option>`).join('')}</select>
                            <select class="start-min"><option value="00">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option></select>
                            <select class="start-ampm"><option value="AM">AM</option><option value="PM">PM</option></select>
                        </div>
                    </div>
                    <div class="field full">
                        <label>End Time</label>
                        <div class="time-grid">
                            <select class="end-hour">${Array.from({length:12}, (_,i) => i + 1).map((h) => `<option value="${String(h).padStart(2,'0')}">${String(h).padStart(2,'0')}</option>`).join('')}</select>
                            <select class="end-min"><option value="00">00</option><option value="15">15</option><option value="30">30</option><option value="45">45</option></select>
                            <select class="end-ampm"><option value="AM">AM</option><option value="PM">PM</option></select>
                        </div>
                    </div>
                </div>
                <div class="subitem-actions"><button class="btn" type="button">Remove</button></div>
            `;
            row.querySelector('.training-type').value = data.type || 'low';
            row.querySelector('.start-hour').value = data.start_hour || '12';
            row.querySelector('.start-min').value = data.start_min || '00';
            row.querySelector('.start-ampm').value = data.start_ampm || 'AM';
            row.querySelector('.end-hour').value = data.end_hour || '12';
            row.querySelector('.end-min').value = data.end_min || '00';
            row.querySelector('.end-ampm').value = data.end_ampm || 'PM';
            row.querySelector('button').addEventListener('click', () => {
                row.remove();
                refreshTrainingHeadings();
                persistNutritionDraft();
            });
            row.querySelectorAll('input,select').forEach((el) => {
                el.addEventListener('input', persistNutritionDraft);
                el.addEventListener('change', persistNutritionDraft);
            });
            container.appendChild(row);
            refreshTrainingHeadings();
        }

        function addSupplementItem(data = {}) {
            const container = document.getElementById('supplementList');
            const count = container.querySelectorAll('.subitem').length + 1;
            const row = document.createElement('div');
            row.className = 'subitem';
            row.innerHTML = `
                <h4>Supplement ${count}</h4>
                <div class="grid">
                    <div class="field"><label>Supplement Name</label><input class="supp-name" value="${data.name || ''}" placeholder="Supplement Name" /></div>
                    <div class="field"><label>Amount (grams)</label><input class="supp-amount" type="number" step="0.1" value="${data.amount ?? 0}" placeholder="0" /></div>
                    <div class="field full"><label>Notes</label><textarea class="supp-notes" placeholder="Notes">${data.notes || ''}</textarea></div>
                </div>
                <div class="subitem-actions"><button class="btn" type="button">Remove</button></div>
            `;
            row.querySelector('button').addEventListener('click', () => {
                row.remove();
                refreshSupplementHeadings();
                persistNutritionDraft();
            });
            row.querySelectorAll('input,textarea').forEach((el) => {
                el.addEventListener('input', persistNutritionDraft);
                el.addEventListener('change', persistNutritionDraft);
            });
            container.appendChild(row);
            refreshSupplementHeadings();
        }

        function refreshTrainingHeadings() {
            Array.from(document.querySelectorAll('#trainingList .subitem h4')).forEach((el, idx) => {
                el.textContent = `Training Session ${idx + 1}`;
            });
        }

        function refreshSupplementHeadings() {
            Array.from(document.querySelectorAll('#supplementList .subitem h4')).forEach((el, idx) => {
                el.textContent = `Supplement ${idx + 1}`;
            });
        }

        function setField(id, value) {
            if (value === null || value === undefined) return;
            const el = fields[id];
            if (!el) return;
            el.value = String(value);
        }

        function getFallbackNutritionDraft() {
            return {
                height: 178,
                weight: 78,
                bodyFat: 14,
                skeletalMuscle: 35,
                activityLevel: 'very_active',
                sport: 'Football',
                position: 'Midfielder',
                progressionType: 'maintain',
                waterInBody: 41,
                minerals: 3.6,
                testRecord: 'Initial assessment completed.',
                injuries: 'No current injuries.',
                mentalNotes: 'Focused and motivated.',
                foodAllergies: 'None',
                medicalNotes: 'No chronic conditions reported.',
                foodLikes: 'Rice, chicken, vegetables',
                foodDislikes: 'Deep fried foods',
                competition: 'none',
                competitionDate: '',
                goalWeight: 76,
                additionalNotes: 'Follow-up in 2 weeks.',
                training_sessions: [
                    { name: 'Training Session 1', type: 'low', days: ['Mo', 'Wed', 'Fri'], start_hour: '06', start_min: '00', start_ampm: 'PM', end_hour: '08', end_min: '00', end_ampm: 'PM' },
                ],
                supplements: [
                    { name: 'Supplement 1', amount: 20, notes: 'Post workout' },
                ],
            };
        }

        function persistNutritionDraft() {
            const draft = {
                height: fields.height.value,
                weight: fields.weight.value,
                bodyFat: fields.bodyFat.value,
                skeletalMuscle: fields.skeletalMuscle.value,
                activityLevel: fields.activityLevel.value,
                sport: fields.sport.value,
                position: fields.position.value,
                progressionType: fields.progressionType.value,
                waterInBody: fields.waterInBody.value,
                minerals: fields.minerals.value,
                testRecord: fields.testRecord.value,
                injuries: fields.injuries.value,
                mentalNotes: fields.mentalNotes.value,
                foodAllergies: fields.foodAllergies.value,
                medicalNotes: fields.medicalNotes.value,
                foodLikes: fields.foodLikes.value,
                foodDislikes: fields.foodDislikes.value,
                competition: fields.competition.value,
                competitionDate: fields.competitionDate.value,
                goalWeight: fields.goalWeight.value,
                additionalNotes: fields.additionalNotes.value,
                training_sessions: collectTrainingSessions(),
                supplements: collectSupplements(),
            };
            localStorage.setItem(AUTOFILL_KEY, JSON.stringify(draft));
        }

        function applyNutritionAutofill(force = false) {
            let draft = {};
            try {
                const raw = localStorage.getItem(AUTOFILL_KEY);
                const parsed = raw ? JSON.parse(raw) : null;
                if (parsed && typeof parsed === 'object') draft = parsed;
            } catch (_) {
                draft = {};
            }
            const fallback = getFallbackNutritionDraft();

            const setIfMissing = (fieldId, draftValue, defaults = [], fallbackValue = '') => {
                const finalValue = (draftValue !== null && draftValue !== undefined && draftValue !== '') ? draftValue : fallbackValue;
                if (finalValue === null || finalValue === undefined) return;
                const el = fields[fieldId];
                if (!el) return;
                const current = String(el.value || '').trim();
                const missing = current === '' || defaults.includes(current);
                if (missing || force) el.value = String(finalValue);
            };

            setIfMissing('height', draft.height, [], fallback.height);
            setIfMissing('weight', draft.weight, [], fallback.weight);
            setIfMissing('bodyFat', draft.bodyFat, [], fallback.bodyFat);
            setIfMissing('skeletalMuscle', draft.skeletalMuscle, [], fallback.skeletalMuscle);
            setIfMissing('activityLevel', draft.activityLevel, ['extremely_active'], fallback.activityLevel);
            setIfMissing('sport', draft.sport, [], fallback.sport);
            setIfMissing('position', draft.position, [], fallback.position);
            setIfMissing('progressionType', draft.progressionType, [''], fallback.progressionType);
            setIfMissing('waterInBody', draft.waterInBody, [], fallback.waterInBody);
            setIfMissing('minerals', draft.minerals, [], fallback.minerals);
            setIfMissing('testRecord', draft.testRecord, [], fallback.testRecord);
            setIfMissing('injuries', draft.injuries, [], fallback.injuries);
            setIfMissing('mentalNotes', draft.mentalNotes, [], fallback.mentalNotes);
            setIfMissing('foodAllergies', draft.foodAllergies, [], fallback.foodAllergies);
            setIfMissing('medicalNotes', draft.medicalNotes, [], fallback.medicalNotes);
            setIfMissing('foodLikes', draft.foodLikes, [], fallback.foodLikes);
            setIfMissing('foodDislikes', draft.foodDislikes, [], fallback.foodDislikes);
            setIfMissing('competition', draft.competition, ['none'], fallback.competition);
            setIfMissing('competitionDate', draft.competitionDate, [], fallback.competitionDate);
            setIfMissing('goalWeight', draft.goalWeight, [], fallback.goalWeight);
            setIfMissing('additionalNotes', draft.additionalNotes, [], fallback.additionalNotes);

            const trainingData = Array.isArray(draft.training_sessions) && draft.training_sessions.length
                ? draft.training_sessions
                : fallback.training_sessions;
            const supplementData = Array.isArray(draft.supplements) && draft.supplements.length
                ? draft.supplements
                : fallback.supplements;

            const trainingList = document.getElementById('trainingList');
            const supplementList = document.getElementById('supplementList');

            if (force || !trainingList.querySelector('.subitem')) {
                trainingList.innerHTML = '';
                trainingData.forEach((item) => {
                    addTrainingSessionItem(item || {});
                });
            }

            if (force || !supplementList.querySelector('.subitem')) {
                supplementList.innerHTML = '';
                supplementData.forEach((item) => {
                    addSupplementItem(item || {});
                });
            }

            recalc();
        }

        function runAutofillNow() {
            applyNutritionAutofill(true);
            persistNutritionDraft();
            showAlert('success', 'Autofill completed for nutrition profile fields.');
        }

        async function loadNutrition() {
            try {
                const headers = {};
                const authHeader = getAuthHeader();
                if (authHeader) headers.Authorization = authHeader;
                const response = await fetch(`${API_BASE_URL}/api/admin/clients/${encodeURIComponent(clientId)}/nutrition`, {
                    credentials: 'include',
                    headers
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) return;

                setField('height', data.height);
                setField('weight', data.weight);
                setField('bmi', data.bmi);
                setField('bodyFat', data.body_fat_percentage);
                setField('skeletalMuscle', data.skeletal_muscle);
                setField('bodyFatMass', data.body_fat_mass);
                setField('musclePercent', data.muscle_percentage);
                setField('bmr', data.bmr);
                setField('activityLevel', data.activity_level || 'extremely_active');
                setField('sport', data.sport);
                setField('position', data.position);
                setField('tdee', data.tdee);
                setField('progressionType', data.progression_type);
                setField('calories', data.calories);
                setField('protein', data.protein_target);
                setField('carbs', data.carbs_target);
                setField('fats', data.fats_target);
                setField('waterInBody', data.water_in_body);
                setField('waterIntake', data.water_intake);
                setField('minerals', data.minerals);
                setField('testRecord', data.test_record_notes);
                setField('injuries', data.injuries);
                setField('mentalNotes', data.mental_notes);
                setField('foodAllergies', data.food_allergies);
                setField('medicalNotes', data.medical_notes);
                setField('foodLikes', data.food_likes);
                setField('foodDislikes', data.food_dislikes);
                setField('competition', data.competition_status || 'none');
                setField('competitionDate', data.competition_date);
                setField('daysLeft', data.days_left);
                setField('goalWeight', data.goal_weight);
                setField('additionalNotes', data.additional_notes);

                (Array.isArray(data.training_sessions) ? data.training_sessions : []).forEach((item) => {
                    addTrainingSessionItem(item || {});
                });

                (Array.isArray(data.supplements) ? data.supplements : []).forEach((item) => {
                    addSupplementItem(item || {});
                });
            } catch (_) {}
        }

        function collectTrainingSessions() {
            return Array.from(document.querySelectorAll('#trainingList .subitem')).map((row) => ({
                name: String(row.querySelector('.training-name')?.value || '').trim(),
                type: String(row.querySelector('.training-type')?.value || 'low').trim(),
                days: Array.from(row.querySelectorAll('.days-grid input:checked')).map((el) => el.value),
                start_hour: String(row.querySelector('.start-hour')?.value || '12'),
                start_min: String(row.querySelector('.start-min')?.value || '00'),
                start_ampm: String(row.querySelector('.start-ampm')?.value || 'AM'),
                end_hour: String(row.querySelector('.end-hour')?.value || '12'),
                end_min: String(row.querySelector('.end-min')?.value || '00'),
                end_ampm: String(row.querySelector('.end-ampm')?.value || 'PM'),
                session: String(row.querySelector('.training-name')?.value || '').trim(),
            })).filter((item) => item.name || item.days.length > 0);
        }

        function collectSupplements() {
            return Array.from(document.querySelectorAll('#supplementList .subitem')).map((row) => ({
                name: String(row.querySelector('.supp-name')?.value || '').trim(),
                amount: num(row.querySelector('.supp-amount')?.value),
                notes: String(row.querySelector('.supp-notes')?.value || '').trim(),
            })).filter((item) => item.name || item.notes || item.amount !== null);
        }

        async function saveNutrition(event) {
            event.preventDefault();
            recalc();

            const payload = {
                height: num(fields.height.value),
                weight: num(fields.weight.value),
                bmi: num(fields.bmi.value),
                body_fat_percentage: num(fields.bodyFat.value),
                skeletal_muscle: num(fields.skeletalMuscle.value),
                body_fat_mass: num(fields.bodyFatMass.value),
                muscle_percentage: num(fields.musclePercent.value),
                bmr: num(fields.bmr.value),
                activity_level: fields.activityLevel.value || null,
                sport: fields.sport.value || null,
                position: fields.position.value || null,
                tdee: num(fields.tdee.value),
                progression_type: fields.progressionType.value || null,
                calories: num(fields.calories.value),
                protein_target: num(fields.protein.value),
                carbs_target: num(fields.carbs.value),
                fats_target: num(fields.fats.value),
                water_in_body: num(fields.waterInBody.value),
                water_intake: num(fields.waterIntake.value),
                minerals: num(fields.minerals.value),
                test_record_notes: fields.testRecord.value || null,
                injuries: fields.injuries.value || null,
                mental_notes: fields.mentalNotes.value || null,
                food_allergies: fields.foodAllergies.value || null,
                medical_notes: fields.medicalNotes.value || null,
                food_likes: fields.foodLikes.value || null,
                food_dislikes: fields.foodDislikes.value || null,
                competition_status: fields.competition.value || 'none',
                competition_date: fields.competitionDate.value || null,
                days_left: num(fields.daysLeft.value),
                goal_weight: num(fields.goalWeight.value),
                additional_notes: fields.additionalNotes.value || null,
                training_sessions: collectTrainingSessions(),
                supplements: collectSupplements(),
            };

            try {
                const headers = { 'Content-Type': 'application/json' };
                const authHeader = getAuthHeader();
                if (authHeader) headers.Authorization = authHeader;
                const response = await fetch(`${API_BASE_URL}/api/admin/clients/${encodeURIComponent(clientId)}/nutrition`, {
                    method: 'PUT',
                    credentials: 'include',
                    headers,
                    body: JSON.stringify(payload)
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    showAlert('error', data.detail || 'Failed to save nutrition profile.');
                    return;
                }

                try {
                    const cacheKey = `clientData_${clientId}`;
                    const existing = JSON.parse(localStorage.getItem(cacheKey) || '{}');
                    const merged = {
                        ...existing,
                        id: existing.id || Number(clientId),
                        displayId: existing.displayId || Number(clientId),
                        height: payload.height,
                        weight: payload.weight,
                        bmi: payload.bmi,
                        bodyFat: payload.body_fat_percentage,
                        muscleMass: payload.skeletal_muscle,
                        bodyFatMass: payload.body_fat_mass,
                        musclePercent: payload.muscle_percentage,
                        bmr: payload.bmr,
                        activityLevel: payload.activity_level || existing.activityLevel || 'N/A',
                        sport: payload.sport || existing.sport || 'N/A',
                        position: payload.position || existing.position || 'N/A',
                        tdee: payload.tdee,
                        progressionType: payload.progression_type || existing.progressionType || 'N/A',
                        calories: payload.calories,
                        proteinTarget: payload.protein_target,
                        carbsTarget: payload.carbs_target,
                        fatsTarget: payload.fats_target,
                        waterInBody: payload.water_in_body,
                        waterIntake: payload.water_intake,
                        minerals: payload.minerals,
                        testRecordNotes: payload.test_record_notes || existing.testRecordNotes || 'N/A',
                        injuries: payload.injuries || existing.injuries || 'N/A',
                        mentalObservation: payload.mental_notes || existing.mentalObservation || 'N/A',
                        foodAllergies: payload.food_allergies || existing.foodAllergies || 'N/A',
                        medical: payload.medical_notes || existing.medical || 'N/A',
                        foodLikes: payload.food_likes || existing.foodLikes || 'N/A',
                        foodDislikes: payload.food_dislikes || existing.foodDislikes || 'N/A',
                        competitionDate: payload.competition_date || existing.competitionDate || 'N/A',
                        daysLeft: payload.days_left ?? existing.daysLeft ?? 'N/A',
                        goalWeight: payload.goal_weight ?? existing.goalWeight ?? 'N/A',
                        additionalNotes: payload.additional_notes || existing.additionalNotes || 'N/A',
                        trainingDetails: Array.isArray(payload.training_sessions) ? payload.training_sessions : (existing.trainingDetails || []),
                        supplements: Array.isArray(payload.supplements)
                            ? payload.supplements.map((s) => `${s?.name || 'Supplement'}${(s?.amount !== null && s?.amount !== undefined && s?.amount !== '') ? ` (${s.amount}g)` : ''}${s?.notes ? ` - ${s.notes}` : ''}`).join(', ')
                            : (existing.supplements || 'No supplements added')
                    };
                    localStorage.setItem(cacheKey, JSON.stringify(merged));
                } catch (_) {
                    // Ignore cache write issues and keep backend save as source of truth.
                }

                persistNutritionDraft();
                showAlert('success', 'Nutrition profile saved successfully.');
            } catch (error) {
                showAlert('error', `Unable to save: ${error.message}`);
            }
        }

        document.getElementById('addTrainingBtn').addEventListener('click', () => addTrainingSessionItem({}));
        document.getElementById('addSupplementBtn').addEventListener('click', () => addSupplementItem({}));
        document.getElementById('autofillBtn').addEventListener('click', runAutofillNow);
        document.getElementById('recalcBtn').addEventListener('click', recalc);
        document.getElementById('nutritionForm').addEventListener('submit', saveNutrition);
        ['height','weight','bodyFat','skeletalMuscle','activityLevel','sport','position','progressionType','waterInBody','minerals','testRecord','injuries','mentalNotes','foodAllergies','medicalNotes','foodLikes','foodDislikes','competition','competitionDate','goalWeight','additionalNotes'].forEach((id) => {
            const el = fields[id];
            if (el) el.addEventListener('input', () => {
                recalc();
                persistNutritionDraft();
            });
            if (el) el.addEventListener('change', () => {
                recalc();
                persistNutritionDraft();
            });
        });

        document.getElementById('trainingList').addEventListener('input', persistNutritionDraft);
        document.getElementById('supplementList').addEventListener('input', persistNutritionDraft);

        loadNutrition().finally(() => {
            applyNutritionAutofill(false);
            persistNutritionDraft();
        });
    </script>
</body>
</html>
